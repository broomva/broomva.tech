# Cross-rs configuration for cross-compiling broomva-cli.
#
# Default cross containers for non-native targets do not ship the
# system libraries `openssl-sys` needs (libssl-dev) or `pkg-config`.
# The pre-build step below installs them in the per-target container
# before `cargo build` runs.
#
# $CROSS_DEB_ARCH is set by cross-rs to the Debian architecture name
# matching the rustc target (e.g. `arm64` for aarch64-unknown-linux-gnu).

[target.aarch64-unknown-linux-gnu]
pre-build = [
    "dpkg --add-architecture $CROSS_DEB_ARCH",
    "apt-get update && apt-get install --assume-yes libssl-dev:$CROSS_DEB_ARCH pkg-config"
]

[target.aarch64-unknown-linux-gnu.env]
# Permit pkg-config to satisfy openssl-sys's cross-arch query.
passthrough = [
    "PKG_CONFIG_ALLOW_CROSS=1",
    "OPENSSL_DIR=/usr",
    "OPENSSL_LIB_DIR=/usr/lib/aarch64-linux-gnu",
    "OPENSSL_INCLUDE_DIR=/usr/include"
]
