name: CI

on:
  pull_request:
    paths-ignore:
      - "docs/**"
      - "*.md"
      - ".control/**"
      - "apps/docs/**"
  push:
    branches: ["main"]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - ".control/**"
      - "apps/docs/**"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate search index
        run: bun run generate:search-index
        working-directory: apps/chat

      - name: Verify search index
        run: test -f apps/chat/public/search-index.json && echo "Search index OK ($(wc -c < apps/chat/public/search-index.json) bytes)"

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run test:types

      - name: Validate internal links
        run: bun run check:links

      - name: Validate content quality
        run: bun run check:content

  sync-assets:
    name: Sync assets to Lago
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for asset changes
        id: changes
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'apps/chat/public/images/' 'apps/chat/public/audio/' 'apps/chat/content/' || true)
          if [ -n "$CHANGED" ]; then
            echo "assets_changed=true" >> "$GITHUB_OUTPUT"
            echo "Changed asset files:"
            echo "$CHANGED"
          else
            echo "assets_changed=false" >> "$GITHUB_OUTPUT"
            echo "No asset changes detected — skipping sync"
          fi

      - name: Setup Bun
        if: steps.changes.outputs.assets_changed == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        if: steps.changes.outputs.assets_changed == 'true'
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        if: steps.changes.outputs.assets_changed == 'true'
        run: bun install --frozen-lockfile

      - name: Sync assets to Lago
        if: steps.changes.outputs.assets_changed == 'true'
        run: bun scripts/sync-assets-to-lago.ts
        env:
          LAGO_URL: ${{ secrets.LAGO_URL }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Only run security on main pushes, not every PR
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Audit dependencies
        run: bunx audit-ci --moderate
        continue-on-error: true

      - name: Check for leaked secrets
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

      - name: Verify lockfile integrity
        run: |
          bun install --frozen-lockfile
          git diff --exit-code bun.lock || (echo "::error::Lockfile changed after install — possible supply chain issue" && exit 1)

      - name: Check for sensitive files in git
        run: |
          SENSITIVE=$(git ls-files | grep -iE '\.env$|\.env\.local|\.env\.prod|credentials|secret|\.pem$|\.key$' || true)
          if [ -n "$SENSITIVE" ]; then
            echo "::error::Sensitive files tracked in git: $SENSITIVE"
            exit 1
          fi
