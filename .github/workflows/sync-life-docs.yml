name: Sync Life Docs

on:
  schedule:
    # Nightly at 02:00 UTC
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (print changes without committing)"
        type: boolean
        default: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout broomva.tech
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout life
        uses: actions/checkout@v6
        with:
          repository: broomva/life
          path: life-repo
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Extract metrics and patch docs
        run: |
          bun scripts/sync-life-docs.ts \
            --life-path ./life-repo \
            ${{ inputs.dry_run == true && '--dry-run' || '' }}

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            git diff --stat
          fi

      - name: Open PR if docs drifted
        if: steps.changes.outputs.changed == 'true' && inputs.dry_run != true
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/sync-life-docs
          commit-message: "chore(docs): sync life metrics from v${{ env.LIFE_VERSION }}"
          title: "chore(docs): sync Life Agent OS metrics"
          body: |
            Auto-generated by the `sync-life-docs` workflow.

            Updated docs to reflect ground-truth metrics from the `broomva/life` workspace:
            - Version, crate count, test count, LOC extracted directly from `Cargo.toml` and source files
            - No manual edits required

            Review the diff to confirm accuracy before merging.
          labels: "documentation,automated"
          delete-branch: true
