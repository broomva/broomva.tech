<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Deep twilight radial gradient — void to luminous core -->
    <radialGradient id="singularity" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7EB8FF" stop-opacity="1"/>
      <stop offset="18%" stop-color="#3B7BF7" stop-opacity="0.9"/>
      <stop offset="45%" stop-color="#0A3D8F" stop-opacity="0.6"/>
      <stop offset="75%" stop-color="#001F3F" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#001F3F" stop-opacity="0"/>
    </radialGradient>
    <!-- Outer glow for event horizon -->
    <radialGradient id="horizon-glow" cx="50%" cy="50%" r="50%">
      <stop offset="60%" stop-color="#001F3F" stop-opacity="0"/>
      <stop offset="85%" stop-color="#0A3D8F" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#3B7BF7" stop-opacity="0.15"/>
    </radialGradient>
    <!-- Arc gradient for orbital paths -->
    <linearGradient id="arc-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7EB8FF" stop-opacity="0"/>
      <stop offset="40%" stop-color="#3B7BF7" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#7EB8FF" stop-opacity="0"/>
    </linearGradient>
    <!-- Core point glow -->
    <radialGradient id="core-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="30%" stop-color="#B8D4FF" stop-opacity="0.8"/>
      <stop offset="70%" stop-color="#3B7BF7" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#001F3F" stop-opacity="0"/>
    </radialGradient>
    <!-- Sparkle glow -->
    <radialGradient id="sparkle" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#7EB8FF" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#3B7BF7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background: deep void -->
  <rect width="512" height="512" fill="#000B18" rx="96"/>

  <!-- Outer event horizon glow -->
  <circle cx="256" cy="256" r="220" fill="url(#horizon-glow)"/>

  <!-- Gravitational lensing rings — concentric, getting tighter toward center -->
  <circle cx="256" cy="256" r="195" fill="none" stroke="#0A3D8F" stroke-width="0.5" opacity="0.2"/>
  <circle cx="256" cy="256" r="165" fill="none" stroke="#0A3D8F" stroke-width="0.6" opacity="0.25"/>
  <circle cx="256" cy="256" r="135" fill="none" stroke="#1A5BC4" stroke-width="0.7" opacity="0.3"/>
  <circle cx="256" cy="256" r="108" fill="none" stroke="#1A5BC4" stroke-width="0.8" opacity="0.35"/>
  <circle cx="256" cy="256" r="84" fill="none" stroke="#3B7BF7" stroke-width="0.9" opacity="0.4"/>
  <circle cx="256" cy="256" r="63" fill="none" stroke="#3B7BF7" stroke-width="1.0" opacity="0.5"/>
  <circle cx="256" cy="256" r="45" fill="none" stroke="#5B9BFF" stroke-width="1.1" opacity="0.6"/>
  <circle cx="256" cy="256" r="30" fill="none" stroke="#7EB8FF" stroke-width="1.3" opacity="0.7"/>

  <!-- Orbital arcs — matter spiraling into the singularity -->
  <!-- Arc 1: top-right sweep -->
  <path d="M 380 140 A 180 180 0 0 1 410 270" fill="none" stroke="url(#arc-gradient)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <!-- Arc 2: bottom-left sweep -->
  <path d="M 132 372 A 180 180 0 0 1 102 242" fill="none" stroke="url(#arc-gradient)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <!-- Arc 3: inner top-left -->
  <path d="M 180 130 A 140 140 0 0 0 115 210" fill="none" stroke="url(#arc-gradient)" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <!-- Arc 4: inner bottom-right -->
  <path d="M 332 382 A 140 140 0 0 0 397 302" fill="none" stroke="url(#arc-gradient)" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <!-- Arc 5: tight inner orbit -->
  <path d="M 290 170 A 90 90 0 0 1 340 260" fill="none" stroke="#5B9BFF" stroke-width="1.2" stroke-linecap="round" opacity="0.45"/>
  <!-- Arc 6: tight inner orbit opposite -->
  <path d="M 222 342 A 90 90 0 0 1 172 252" fill="none" stroke="#5B9BFF" stroke-width="1.2" stroke-linecap="round" opacity="0.45"/>

  <!-- Accretion disk — the brightest ring just outside the singularity -->
  <circle cx="256" cy="256" r="18" fill="none" stroke="#7EB8FF" stroke-width="2" opacity="0.7"/>

  <!-- Central singularity: radiant core -->
  <circle cx="256" cy="256" r="24" fill="url(#singularity)" opacity="0.9"/>
  <circle cx="256" cy="256" r="8" fill="url(#core-glow)"/>
  <circle cx="256" cy="256" r="3" fill="#FFFFFF"/>

  <!-- Arcane sparkle particles — matter being drawn in -->
  <circle cx="340" cy="168" r="3" fill="url(#sparkle)"/>
  <circle cx="155" cy="355" r="2.5" fill="url(#sparkle)"/>
  <circle cx="380" cy="300" r="2" fill="url(#sparkle)"/>
  <circle cx="130" cy="195" r="2" fill="url(#sparkle)"/>
  <circle cx="310" cy="390" r="1.8" fill="url(#sparkle)"/>
  <circle cx="195" cy="125" r="1.8" fill="url(#sparkle)"/>

  <!-- Four-point star flare at core — the arcane signature -->
  <path d="M 256 238 L 258 254 L 274 256 L 258 258 L 256 274 L 254 258 L 238 256 L 254 254 Z" fill="#FFFFFF" opacity="0.6"/>
</svg>
