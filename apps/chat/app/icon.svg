<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <filter id="g" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="w" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="i" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="1" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" fill="#000B18" rx="7"/>

  <!-- Outer faint disk bands -->
  <ellipse cx="16" cy="16.2" rx="13.5" ry="6.2" fill="none" stroke="#0D2B55" stroke-width="0.4" opacity="0.2" transform="rotate(-20 16 16.2)"/>
  <ellipse cx="16" cy="16.2" rx="12.2" ry="5.7" fill="none" stroke="#163F73" stroke-width="0.6" opacity="0.25" transform="rotate(-20 16 16.2)"/>
  <ellipse cx="16" cy="16.2" rx="11" ry="5.2" fill="none" stroke="#1A4A8E" stroke-width="0.8" opacity="0.3" transform="rotate(-20 16 16.2)"/>

  <!-- Mid disk bands — getting brighter -->
  <ellipse cx="16" cy="16.2" rx="9.8" ry="4.8" fill="none" stroke="#3078C8" stroke-width="1.1" opacity="0.35" transform="rotate(-20 16 16.2)" filter="url(#g)"/>
  <ellipse cx="16" cy="16.2" rx="8.6" ry="4.3" fill="none" stroke="#5B9BFF" stroke-width="1.5" opacity="0.45" transform="rotate(-20 16 16.2)" filter="url(#w)"/>
  <ellipse cx="16" cy="16.2" rx="7.4" ry="3.8" fill="none" stroke="#90C4FF" stroke-width="1.8" opacity="0.55" transform="rotate(-20 16 16.2)" filter="url(#w)"/>

  <!-- Bright inner band — white-hot accretion -->
  <ellipse cx="16" cy="16.2" rx="6.2" ry="3.4" fill="none" stroke="#C0E0FF" stroke-width="1.6" opacity="0.6" transform="rotate(-20 16 16.2)" filter="url(#i)"/>
  <ellipse cx="16" cy="16.2" rx="5.2" ry="2.9" fill="none" stroke="#E0F0FF" stroke-width="1.2" opacity="0.65" transform="rotate(-20 16 16.2)" filter="url(#i)"/>
  <ellipse cx="16" cy="16.2" rx="4.4" ry="2.6" fill="none" stroke="#F0F8FF" stroke-width="0.8" opacity="0.7" transform="rotate(-20 16 16.2)" filter="url(#i)"/>

  <!-- THE VOID — black hole -->
  <circle cx="16" cy="16.2" r="2.8" fill="#000510"/>
  <circle cx="16" cy="16.2" r="3" fill="none" stroke="#000510" stroke-width="0.4"/>

  <!-- Photon ring — bright edge of the void -->
  <ellipse cx="16" cy="16.2" rx="3.2" ry="1.9" fill="none" stroke="#FFFFFF" stroke-width="0.25" opacity="0.6" transform="rotate(-20 16 16.2)" filter="url(#g)"/>
  <ellipse cx="16" cy="16.2" rx="3.4" ry="2" fill="none" stroke="#D0E8FF" stroke-width="0.4" opacity="0.4" transform="rotate(-20 16 16.2)" filter="url(#g)"/>

  <!-- Sparkle particles -->
  <circle cx="22.5" cy="9.5" r="0.4" fill="#B8D4FF" opacity="0.5"/>
  <circle cx="8.5" cy="23" r="0.35" fill="#7EB8FF" opacity="0.4"/>
  <circle cx="24.5" cy="19" r="0.25" fill="#7EB8FF" opacity="0.35"/>
</svg>
