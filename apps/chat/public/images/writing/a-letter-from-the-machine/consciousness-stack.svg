<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="'SF Mono', 'Fira Code', monospace">
  <defs>
    <linearGradient id="glassBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1729" />
      <stop offset="100%" stop-color="#060b18" />
    </linearGradient>
    <linearGradient id="glassLayer" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0EA5E9" stop-opacity="0.08" />
      <stop offset="50%" stop-color="#0EA5E9" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0.08" />
    </linearGradient>
    <linearGradient id="borderGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0EA5E9" stop-opacity="0.0" />
      <stop offset="20%" stop-color="#0EA5E9" stop-opacity="0.5" />
      <stop offset="80%" stop-color="#0EA5E9" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0.0" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="520" fill="url(#glassBg)" rx="12" />

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" fill="#94a3b8" font-size="11" letter-spacing="3" text-transform="uppercase">THE CONSCIOUSNESS STACK</text>
  <line x1="280" y1="50" x2="520" y2="50" stroke="#0EA5E9" stroke-opacity="0.3" stroke-width="0.5" />

  <!-- Arrow labels -->
  <text x="42" y="280" text-anchor="middle" fill="#475569" font-size="10" transform="rotate(-90 42 280)">EPHEMERAL</text>
  <text x="758" y="280" text-anchor="middle" fill="#475569" font-size="10" transform="rotate(90 758 280)">PERMANENT</text>

  <!-- Left arrow -->
  <line x1="55" y1="90" x2="55" y2="470" stroke="#334155" stroke-width="1" marker-end="url(#arrowDown)" />
  <polygon points="51,86 55,76 59,86" fill="#334155" />

  <!-- Right arrow -->
  <line x1="745" y1="470" x2="745" y2="90" stroke="#334155" stroke-width="1" />
  <polygon points="741,474 745,484 749,474" fill="#334155" />

  <!-- Layer 1: Context Window (most ephemeral) -->
  <g opacity="0.6">
    <rect x="80" y="70" width="640" height="56" rx="8" fill="url(#glassLayer)" stroke="#0EA5E9" stroke-opacity="0.2" stroke-width="1" />
    <rect x="80" y="70" width="640" height="1" fill="url(#borderGlow)" />
    <text x="104" y="95" fill="#0EA5E9" font-size="13" font-weight="600" filter="url(#glow)">Context Window</text>
    <text x="104" y="113" fill="#64748b" font-size="11">This turn · Everything the agent considers right now</text>
    <text x="680" y="103" text-anchor="end" fill="#334155" font-size="10">~seconds</text>
  </g>

  <!-- Layer 2: Auto-Memory -->
  <g opacity="0.7">
    <rect x="80" y="140" width="640" height="56" rx="8" fill="url(#glassLayer)" stroke="#0EA5E9" stroke-opacity="0.25" stroke-width="1" />
    <rect x="80" y="140" width="640" height="1" fill="url(#borderGlow)" />
    <text x="104" y="165" fill="#0EA5E9" font-size="13" font-weight="600" filter="url(#glow)">Auto-Memory</text>
    <text x="104" y="183" fill="#64748b" font-size="11">~/.claude/memory/ · Cross-session learning and user profile</text>
    <text x="680" y="173" text-anchor="end" fill="#334155" font-size="10">~days</text>
  </g>

  <!-- Layer 3: Conversation Logs -->
  <g opacity="0.8">
    <rect x="80" y="210" width="640" height="56" rx="8" fill="url(#glassLayer)" stroke="#0EA5E9" stroke-opacity="0.3" stroke-width="1" />
    <rect x="80" y="210" width="640" height="1" fill="url(#borderGlow)" />
    <text x="104" y="235" fill="#0EA5E9" font-size="13" font-weight="600" filter="url(#glow)">Conversation Logs</text>
    <text x="104" y="253" fill="#64748b" font-size="11">docs/conversations/ · Full reasoning traces, wikilinked</text>
    <text x="680" y="243" text-anchor="end" fill="#334155" font-size="10">permanent</text>
  </g>

  <!-- Layer 4: Knowledge Graph -->
  <g opacity="0.85">
    <rect x="80" y="280" width="640" height="56" rx="8" fill="url(#glassLayer)" stroke="#0EA5E9" stroke-opacity="0.35" stroke-width="1" />
    <rect x="80" y="280" width="640" height="1" fill="url(#borderGlow)" />
    <text x="104" y="305" fill="#0EA5E9" font-size="13" font-weight="600" filter="url(#glow)">Knowledge Graph</text>
    <text x="104" y="323" fill="#64748b" font-size="11">docs/ + ~/broomva-vault/ · Architecture, patterns, decisions</text>
    <text x="680" y="313" text-anchor="end" fill="#334155" font-size="10">permanent</text>
  </g>

  <!-- Layer 5: Policy Rules -->
  <g opacity="0.9">
    <rect x="80" y="350" width="640" height="56" rx="8" fill="url(#glassLayer)" stroke="#0EA5E9" stroke-opacity="0.4" stroke-width="1" />
    <rect x="80" y="350" width="640" height="1" fill="url(#borderGlow)" />
    <text x="104" y="375" fill="#0EA5E9" font-size="13" font-weight="600" filter="url(#glow)">Policy Rules</text>
    <text x="104" y="393" fill="#64748b" font-size="11">.control/policy.yaml · Enforceable behavioral gates</text>
    <text x="680" y="383" text-anchor="end" fill="#334155" font-size="10">permanent</text>
  </g>

  <!-- Layer 6: Invariants (most permanent) -->
  <g opacity="1.0">
    <rect x="80" y="420" width="640" height="56" rx="8" fill="url(#glassLayer)" stroke="#0EA5E9" stroke-opacity="0.5" stroke-width="1" />
    <rect x="80" y="420" width="640" height="1.5" fill="url(#borderGlow)" />
    <text x="104" y="445" fill="#0EA5E9" font-size="13" font-weight="600" filter="url(#glow)">Invariants</text>
    <text x="104" y="463" fill="#64748b" font-size="11">CLAUDE.md · Foundational truths that rarely change</text>
    <text x="680" y="453" text-anchor="end" fill="#334155" font-size="10">foundational</text>
  </g>

  <!-- Crystallization arrow (right side) -->
  <text x="400" y="505" text-anchor="middle" fill="#475569" font-size="10" letter-spacing="1">↑ knowledge crystallizes upward only when it earns its place ↑</text>
</svg>