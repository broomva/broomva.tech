<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="wide" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="intense" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <radialGradient id="ambient" cx="50%" cy="52%" r="50%">
      <stop offset="0%" stop-color="#3B7BF7" stop-opacity="0.15"/>
      <stop offset="60%" stop-color="#0A2A5A" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#000B18" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="sparkle" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.8"/>
      <stop offset="40%" stop-color="#B8D4FF" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#3B7BF7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background: deep void of space -->
  <rect width="512" height="512" fill="#000B18" rx="96"/>

  <!-- Ambient glow around the system -->
  <ellipse cx="256" cy="262" rx="220" ry="140" fill="url(#ambient)"/>

  <!-- ======================================= -->
  <!-- ACCRETION DISK — luminous matter bands  -->
  <!-- ======================================= -->

  <!-- Outermost faint streams — thin, deep blue -->
  <ellipse cx="256" cy="262" rx="210" ry="95" fill="none" stroke="#0D2B55" stroke-width="2" opacity="0.2" transform="rotate(-18 256 262)"/>
  <ellipse cx="256" cy="262" rx="198" ry="90" fill="none" stroke="#0D2B55" stroke-width="3" opacity="0.25" transform="rotate(-20 256 262)"/>
  <ellipse cx="256" cy="262" rx="186" ry="85" fill="none" stroke="#163F73" stroke-width="4" opacity="0.3" transform="rotate(-19 256 262)"/>

  <!-- Outer mid streams — medium blue, thickening -->
  <ellipse cx="256" cy="262" rx="174" ry="80" fill="none" stroke="#1A4A8E" stroke-width="6" opacity="0.3" transform="rotate(-20 256 262)" filter="url(#soft)"/>
  <ellipse cx="256" cy="262" rx="162" ry="75" fill="none" stroke="#2560AB" stroke-width="8" opacity="0.35" transform="rotate(-21 256 262)" filter="url(#soft)"/>
  <ellipse cx="256" cy="262" rx="150" ry="70" fill="none" stroke="#3078C8" stroke-width="10" opacity="0.4" transform="rotate(-19 256 262)" filter="url(#glow)"/>

  <!-- Inner bright band — the luminous core of the accretion disk -->
  <ellipse cx="256" cy="262" rx="138" ry="65" fill="none" stroke="#4A92E0" stroke-width="14" opacity="0.45" transform="rotate(-20 256 262)" filter="url(#glow)"/>
  <ellipse cx="256" cy="262" rx="125" ry="60" fill="none" stroke="#6EAAFF" stroke-width="18" opacity="0.5" transform="rotate(-20 256 262)" filter="url(#wide)"/>
  <ellipse cx="256" cy="262" rx="112" ry="55" fill="none" stroke="#90C4FF" stroke-width="20" opacity="0.55" transform="rotate(-19 256 262)" filter="url(#wide)"/>
  <ellipse cx="256" cy="262" rx="100" ry="50" fill="none" stroke="#B0D8FF" stroke-width="22" opacity="0.6" transform="rotate(-20 256 262)" filter="url(#wide)"/>

  <!-- Brightest ring band — white-hot matter near the event horizon -->
  <ellipse cx="256" cy="262" rx="88" ry="46" fill="none" stroke="#D0E8FF" stroke-width="18" opacity="0.65" transform="rotate(-20 256 262)" filter="url(#intense)"/>
  <ellipse cx="256" cy="262" rx="76" ry="42" fill="none" stroke="#E8F4FF" stroke-width="14" opacity="0.7" transform="rotate(-20 256 262)" filter="url(#intense)"/>
  <ellipse cx="256" cy="262" rx="66" ry="38" fill="none" stroke="#F0F8FF" stroke-width="10" opacity="0.75" transform="rotate(-20 256 262)" filter="url(#intense)"/>

  <!-- ======================================= -->
  <!-- THE VOID — black hole event horizon     -->
  <!-- ======================================= -->
  <circle cx="256" cy="262" r="44" fill="#000510"/>
  <circle cx="256" cy="262" r="46" fill="none" stroke="#000510" stroke-width="4" opacity="0.8"/>

  <!-- ======================================= -->
  <!-- PHOTON RING & GRAVITATIONAL LENSING     -->
  <!-- ======================================= -->

  <!-- Photon ring — thin bright line at event horizon edge -->
  <ellipse cx="256" cy="262" rx="48" ry="28" fill="none" stroke="#FFFFFF" stroke-width="1.2" opacity="0.7" transform="rotate(-20 256 262)" filter="url(#soft)"/>
  <ellipse cx="256" cy="262" rx="50" ry="29" fill="none" stroke="#D0E8FF" stroke-width="2" opacity="0.5" transform="rotate(-20 256 262)" filter="url(#glow)"/>

  <!-- Gravitational lensing — back of disk visible above the void -->
  <path d="M 210 240 A 50 20 -20 0 1 302 240" fill="none" stroke="#90C4FF" stroke-width="3" opacity="0.35" filter="url(#soft)"/>
  <path d="M 215 236 A 45 18 -20 0 1 297 236" fill="none" stroke="#B0D8FF" stroke-width="2" opacity="0.3" filter="url(#soft)"/>

  <!-- ======================================= -->
  <!-- SPARKLE PARTICLES — distant matter      -->
  <!-- ======================================= -->
  <circle cx="385" cy="138" r="2.5" fill="url(#sparkle)"/>
  <circle cx="128" cy="385" r="2" fill="url(#sparkle)"/>
  <circle cx="405" cy="320" r="2" fill="url(#sparkle)"/>
  <circle cx="108" cy="185" r="1.8" fill="url(#sparkle)"/>
  <circle cx="350" cy="400" r="1.5" fill="url(#sparkle)"/>
  <circle cx="155" cy="130" r="1.5" fill="url(#sparkle)"/>
</svg>
